<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Inventory Manager</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background: #f4f4f9; color: #333; }
    h2, h3 { margin-top: 0; }
    .card { background: white; padding: 16px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 16px; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; overflow: hidden; }
    
    label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-top: 6px; }
    input[type="text"], input[type="number"] { 
      width: 100%; box-sizing: border-box; padding: 9px; margin-top: 3px; margin-bottom: 6px; 
      border-radius: 6px; border: 1px solid #ccc; font-size: 14px; 
    }
    
    .table-input { width: 70px !important; padding: 6px !important; margin: 0 !important; text-align: center; font-weight: bold; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    
    button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: #007bff; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-warning { background: #ffc107; color: #212529; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-info { background: #17a2b8; color: white; }
    .btn-sm { padding: 6px 10px; font-size: 12px; margin-top: 0; width: auto; display: inline-block; }
    
    .status-banner { background: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; display: none; }
    
    .scan-action-box { 
      margin-top: 15px; padding: 16px; border-radius: 8px; background: #ffffff; 
      border: 2px solid #007bff; text-align: left;
    }
    .scan-action-box.new-item { border-color: #ffc107; background: #fffdf5; }
    
    .variance-tag { font-weight: bold; padding: 4px 8px; border-radius: 4px; display: inline-block; }
    .variance-negative { background: #f8d7da; color: #721c24; }
    .variance-zero { background: #d4edda; color: #155724; }
    .variance-positive { background: #cce5ff; color: #004085; }
    
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
    .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 10px; max-width: 500px; width: 90%; box-sizing: border-box; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; vertical-align: middle; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>

  <h2 style="text-align: center;">Inventory Manager</h2>

  <div id="statusBanner" class="status-banner"></div>

  <!-- 1. CSV Loader -->
  <div class="card">
    <h3>1. Load Inventory (CSV)</h3>
    <p style="font-size: 11px; color: #666; margin-top:-6px;">14 Columns: <b>UPC, Name, Book, Physical, Variance, Reorder, Price, Cost, Category, Vendor, SKU, ASIN, Item#, Model#</b></p>
    <input type="file" id="csvFileInput" accept=".csv" />
  </div>

  <!-- 2. Camera Scanner -->
  <div class="card">
    <h3>2. Scan Product</h3>
    <div id="reader"></div>
    <div id="scanResult" style="display:none;"></div>
  </div>

  <!-- 3. Actions & Share -->
  <div class="card">
    <h3>3. Actions & Share</h3>
    <button class="btn-warning" onclick="openEditModal()">+ Add Item Manually</button>
    <button class="btn-info" id="emailBtn" onclick="emailCSV()" disabled>✉️ Email / Share CSV</button>
    <button class="btn-success" id="exportBtn" onclick="exportCSV()" disabled>📥 Download Inventory CSV</button>
    <button class="btn-danger" style="margin-top:16px; padding:8px; font-size:12px;" onclick="clearLocalStorage()">🗑️ Clear Saved Local Memory</button>
  </div>

  <!-- Inventory Table -->
  <div class="card">
    <h3>Inventory List (<span id="itemCount">0</span>)</h3>
    <div style="overflow-x:auto;">
      <table id="inventoryTable">
        <thead>
          <tr>
            <th>UPC (Bar Code)</th>
            <th>Product Name</th>
            <th>Book</th>
            <th>Physical</th>
            <th>Variance</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Edit/Add Modal with All 14 Fields -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Edit Product Details</h3>
      <input type="hidden" id="editIndex" value="-1">
      
      <div class="grid-2">
        <div><label>UPC (Bar Code)</label><input type="text" id="field_upc"></div>
        <div><label>SKU</label><input type="text" id="field_sku"></div>
      </div>
      
      <label>Product Name</label>
      <input type="text" id="field_name">

      <div class="grid-2">
        <div><label>Book Inventory</label><input type="number" id="field_bookQty"></div>
        <div><label>Physical Inventory</label><input type="number" id="field_physicalQty"></div>
      </div>
      
      <div class="grid-2">
        <div><label>Reorder Point</label><input type="number" id="field_reorderPoint"></div>
        <div><label>Category</label><input type="text" id="field_category"></div>
      </div>

      <div class="grid-2">
        <div><label>List Price ($)</label><input type="number" step="0.01" id="field_listPrice"></div>
        <div><label>Cost on Delivery ($)</label><input type="number" step="0.01" id="field_costOnDelivery"></div>
      </div>

      <div class="grid-2">
        <div><label>Vendor</label><input type="text" id="field_vendor"></div>
        <div><label>ASIN (Amazon)</label><input type="text" id="field_asin"></div>
      </div>

      <div class="grid-2">
        <div><label>Item Number</label><input type="text" id="field_itemNumber"></div>
        <div><label>Model Number</label><input type="text" id="field_modelNumber"></div>
      </div>

      <button class="btn-primary" onclick="saveModalItem()">Save Changes</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script>
    let inventory = [];
    let html5QrcodeScanner;
    let isProcessing = false;
    const STORAGE_KEY = 'shop_inventory_app_v3';

    window.addEventListener('DOMContentLoaded', () => {
      loadLocalStorage();
    });

    function saveLocalStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
      enableActionButtons();
    }

    function loadLocalStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          inventory = JSON.parse(saved);
          if (inventory.length > 0) {
            updateTable();
            enableActionButtons();
            showStatusBanner(`💾 Restored ${inventory.length} saved items from phone memory.`);
          }
        } catch(e) {
          console.error("Local storage error:", e);
        }
      }
    }

    function clearLocalStorage() {
      if (confirm("Clear saved local memory? Ensure you have downloaded or emailed your CSV first!")) {
        localStorage.removeItem(STORAGE_KEY);
        inventory = [];
        updateTable();
        document.getElementById('exportBtn').disabled = true;
        document.getElementById('emailBtn').disabled = true;
        showStatusBanner("🗑️ Local memory cleared.");
      }
    }

    function showStatusBanner(msg) {
      const banner = document.getElementById('statusBanner');
      banner.innerText = msg;
      banner.style.display = 'block';
    }

    function enableActionButtons() {
      const hasData = inventory.length > 0;
      document.getElementById('exportBtn').disabled = !hasData;
      document.getElementById('emailBtn').disabled = !hasData;
    }

    // Custom CSV Parser function to safely parse quoted strings
    function parseCsvLine(text) {
      let val = '', inQuotes = false, row = [];
      for (let i = 0; i < text.length; i++) {
        let c = text[i];
        if (c === '"') {
          inQuotes = !inQuotes;
        } else if (c === ',' && !inQuotes) {
          row.push(val.trim().replace(/^"|"$/g, ''));
          val = '';
        } else {
          val += c;
        }
      }
      row.push(val.trim().replace(/^"|"$/g, ''));
      return row;
    }

    // Load 14-Column CSV File
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        const lines = evt.target.result.split('\n');
        if (lines.length === 0) return;

        // Auto-detect if line 0 is a header row
        const firstLineCols = parseCsvLine(lines[0]);
        const isHeader = firstLineCols[0].toLowerCase().includes('upc') || firstLineCols[1].toLowerCase().includes('product') || firstLineCols[1].toLowerCase().includes('name');
        const startIndex = isHeader ? 1 : 0;

        inventory = [];
        
        for (let i = startIndex; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          const c = parseCsvLine(lines[i]);

          if (c.length > 0 && (c[0] || c[1] || c[10])) {
            inventory.push({
              upc: c[0] || '',
              name: c[1] || 'Unnamed Product',
              bookQty: parseInt(c[2]) || 0,
              physicalQty: (c[3] !== undefined && c[3] !== '') ? parseInt(c[3]) : 0,
              reorderPoint: c[5] || '0',
              listPrice: c[6] || '0',
              costOnDelivery: c[7] || '0',
              category: c[8] || '',
              vendor: c[9] || '',
              sku: c[10] || '',
              asin: c[11] || '',
              itemNumber: c[12] || '',
              modelNumber: c[13] || ''
            });
          }
        }

        updateTable();
        saveLocalStorage();
        showStatusBanner(`✅ Loaded ${inventory.length} items from CSV.`);
      };
      reader.readAsText(file);
    });

    // Render Table UI
    function updateTable() {
      const tbody = document.querySelector('#inventoryTable tbody');
      tbody.innerHTML = '';
      document.getElementById('itemCount').innerText = inventory.length;

      inventory.forEach((item, index) => {
        const variance = item.physicalQty - item.bookQty;
        
        let varianceClass = "variance-zero";
        let varianceText = variance.toString();
        if (variance < 0) {
          varianceClass = "variance-negative";
        } else if (variance > 0) {
          varianceClass = "variance-positive";
          varianceText = "+" + variance;
        }

        const row = `
          <tr>
            <td>${item.upc || item.sku || 'N/A'}</td>
            <td><b>${item.name}</b></td>
            <td>${item.bookQty}</td>
            <td>
              <input type="number" class="table-input" value="${item.physicalQty}" min="0" onchange="updatePhysicalDirect(${index}, this.value)">
            </td>
            <td>
              <span class="variance-tag ${varianceClass}">${varianceText}</span>
            </td>
            <td>
              <button class="btn-warning btn-sm" onclick="openEditModal(${index})">Edit</button>
              <button class="btn-danger btn-sm" onclick="deleteItem(${index})">X</button>
            </td>
          </tr>`;
        tbody.innerHTML += row;
      });
    }

    function updatePhysicalDirect(index, value) {
      const parsedVal = parseInt(value);
      if (!isNaN(parsedVal)) {
        inventory[index].physicalQty = parsedVal;
        updateTable();
        saveLocalStorage();
      }
    }

    // Barcode Scan Handler (Matches UPC, SKU, Item#, Model#)
    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      try { html5QrcodeScanner.pause(true); } catch(e) {}

      const index = inventory.findIndex(i => 
        (i.upc && i.upc === decodedText) || 
        (i.sku && i.sku === decodedText) || 
        (i.itemNumber && i.itemNumber === decodedText) ||
        (i.modelNumber && i.modelNumber === decodedText)
      );
      
      const resultDiv = document.getElementById('scanResult');
      resultDiv.style.display = 'block';

      if (index !== -1) {
        const item = inventory[index];
        resultDiv.className = "scan-action-box";
        resultDiv.innerHTML = `
          <h4 style="margin:0 0 8px 0; color:#007bff;">✅ Matched Item</h4>
          <p style="margin:2px 0;"><b>Name:</b> ${item.name}</p>
          <p style="margin:2px 0;"><b>UPC:</b> ${item.upc || 'N/A'} | <b>Book Qty:</b> ${item.bookQty}</p>
          <label><b>Physical Inventory Count:</b></label>
          <input type="number" id="scanQtyInput" value="${item.physicalQty + 1}">
          <button class="btn-success" onclick="saveScanCount(${index})">Save Stock & Scan Next</button>
        `;
      } else {
        resultDiv.className = "scan-action-box new-item";
        resultDiv.innerHTML = `
          <h4 style="margin:0 0 8px 0; color:#d97706;">⚠️ New Barcode Detected</h4>
          <p style="margin:2px 0;"><b>Code:</b> ${decodedText}</p>
          <button class="btn-primary" onclick="createNewScannedItem('${decodedText}')">Register New Item</button>
          <button class="btn-secondary" onclick="resumeScanner()">Cancel / Skip</button>
        `;
      }
    }

    function saveScanCount(index) {
      const newQty = parseInt(document.getElementById('scanQtyInput').value);
      if (!isNaN(newQty)) {
        inventory[index].physicalQty = newQty;
        updateTable();
        saveLocalStorage();
      }
      resumeScanner();
    }

    function createNewScannedItem(code) {
      document.getElementById('scanResult').style.display = 'none';
      openEditModal(-1, code);
    }

    function resumeScanner() {
      const resultDiv = document.getElementById('scanResult');
      resultDiv.style.display = 'none';
      resultDiv.innerHTML = '';
      isProcessing = false;
      try { html5QrcodeScanner.resume(); } catch(e) {}
    }

    // Modal Operations
    function openEditModal(index = -1, scannedCode = '') {
      document.getElementById('editIndex').value = index;
      
      if (index >= 0) {
        const item = inventory[index];
        document.getElementById('modalTitle').innerText = "Edit Product Details";
        document.getElementById('field_upc').value = item.upc;
        document.getElementById('field_name').value = item.name;
        document.getElementById('field_bookQty').value = item.bookQty;
        document.getElementById('field_physicalQty').value = item.physicalQty;
        document.getElementById('field_reorderPoint').value = item.reorderPoint;
        document.getElementById('field_listPrice').value = item.listPrice;
        document.getElementById('field_costOnDelivery').value = item.costOnDelivery;
        document.getElementById('field_category').value = item.category;
        document.getElementById('field_vendor').value = item.vendor;
        document.getElementById('field_sku').value = item.sku;
        document.getElementById('field_asin').value = item.asin;
        document.getElementById('field_itemNumber').value = item.itemNumber;
        document.getElementById('field_modelNumber').value = item.modelNumber;
      } else {
        document.getElementById('modalTitle').innerText = "Add New Product";
        document.getElementById('field_upc').value = scannedCode || '';
        document.getElementById('field_name').value = '';
        document.getElementById('field_bookQty').value = '0';
        document.getElementById('field_physicalQty').value = '1';
        document.getElementById('field_reorderPoint').value = '0';
        document.getElementById('field_listPrice').value = '0';
        document.getElementById('field_costOnDelivery').value = '0';
        document.getElementById('field_category').value = '';
        document.getElementById('field_vendor').value = '';
        document.getElementById('field_sku').value = '';
        document.getElementById('field_asin').value = '';
        document.getElementById('field_itemNumber').value = '';
        document.getElementById('field_modelNumber').value = '';
      }
      
      document.getElementById('editModal').style.display = 'block';
    }

    function saveModalItem() {
      const index = parseInt(document.getElementById('editIndex').value);
      
      const itemData = {
        upc: document.getElementById('field_upc').value.trim(),
        name: document.getElementById('field_name').value.trim() || 'Unnamed Item',
        bookQty: parseInt(document.getElementById('field_bookQty').value) || 0,
        physicalQty: parseInt(document.getElementById('field_physicalQty').value) || 0,
        reorderPoint: document.getElementById('field_reorderPoint').value.trim() || '0',
        listPrice: document.getElementById('field_listPrice').value.trim() || '0',
        costOnDelivery: document.getElementById('field_costOnDelivery').value.trim() || '0',
        category: document.getElementById('field_category').value.trim(),
        vendor: document.getElementById('field_vendor').value.trim(),
        sku: document.getElementById('field_sku').value.trim(),
        asin: document.getElementById('field_asin').value.trim(),
        itemNumber: document.getElementById('field_itemNumber').value.trim(),
        modelNumber: document.getElementById('field_modelNumber').value.trim()
      };

      if (index >= 0) {
        inventory[index] = itemData;
      } else {
        inventory.push(itemData);
      }

      updateTable();
      saveLocalStorage();
      closeModal();
    }

    function deleteItem(index) {
      if (confirm(`Delete "${inventory[index].name}"?`)) {
        inventory.splice(index, 1);
        updateTable();
        saveLocalStorage();
      }
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
      if (isProcessing) {
        resumeScanner();
      }
    }

    // Build 14-Column CSV String
    function buildCSVString() {
      let csv = "UPC (Bar Code),Product Name,Book Inventory,Physical inventory,Variance,Reorder Point,List price,Cost on Delivery,Category,Vendor,SKU,ASIN (Amazon),Item number,Model Number\n";
      inventory.forEach(i => {
        const variance = (i.physicalQty || 0) - (i.bookQty || 0);
        csv += `"${i.upc || ''}","${i.name || ''}",${i.bookQty || 0},${i.physicalQty || 0},${variance},"${i.reorderPoint || 0}","${i.listPrice || 0}","${i.costOnDelivery || 0}","${i.category || ''}","${i.vendor || ''}","${i.sku || ''}","${i.asin || ''}","${i.itemNumber || ''}","${i.modelNumber || ''}"\n`;
      });
      return csv;
    }

    function exportCSV() {
      const csvContent = "data:text/csv;charset=utf-8," + buildCSVString();
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `inventory_counts_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function emailCSV() {
      const csvText = buildCSVString();
      const fileName = `inventory_counts_${new Date().toISOString().slice(0,10)}.csv`;

      if (navigator.canShare && navigator.canShare({ files: [new File([], fileName, { type: 'text/csv' })] })) {
        try {
          const file = new File([csvText], fileName, { type: 'text/csv' });
          await navigator.share({
            title: 'Inventory Count Export',
            text: 'Attached is the shop inventory count CSV.',
            files: [file]
          });
          return;
        } catch (err) {
          if (err.name !== 'AbortError') console.error("Share failed:", err);
        }
      }

      const subject = encodeURIComponent("Inventory Count Export");
      const body = encodeURIComponent("Inventory Counts:\n\n" + csvText);
      window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    // Initialize Camera Scanner
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } });
    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
